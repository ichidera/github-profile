name: Update GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ichidera
          base: header
          output_action: gist
          committer_message: "chore: update metrics"
          committer_name: "GitHub Metrics"
          committer_email: "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Core plugins
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          
          plugin_followup: yes
          plugin_habits: yes
          plugin_habits_from: 200
          
          plugin_lines: yes
          plugin_notable: yes
          plugin_notable_from: all
          
          plugin_stackoverflow: no
          plugin_wakatime: no
          
          template: classic
          config_timezone: UTC
          config_display: large

      - name: Generate stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ichidera
          filename: metrics-stats.svg
          output_action: commit
          committer_message: "chore: update metrics stats"
          committer_name: "GitHub Metrics"
          committer_email: "41898282+github-actions[bot]@users.noreply.github.com"
          
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_achievements: yes
          plugin_achievements_threshold: C
          
          template: classic

      - name: Generate trophies alternative
        uses: ryo-ma/github-profile-trophy@v2
        with:
          username: ichidera
          theme: tokyonight
          no-frame: true
          row: 1
          column: 6
          margin-w: 15
          margin-h: 15
      
      - name: Commit trophy results
        run: |
          if [ -f github-profile-trophy.svg ]; then
            mv github-profile-trophy.svg metrics-trophy.svg
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add metrics-trophy.svg
            git commit -m "chore: update trophy metrics" || true
            git push
          fi
